idea:
  title: LLMs Know the Answer They Want to Give
  domain: artificial_intelligence
  hypothesis: 'RL-fine-tuned LLMs exhibit a disadvantage in that they tend to pre-plan
    the end of their next turn, resulting in less ability to react to new information
    compared to base LLMs. By rotating what is certain about the answer through a
    series of questions, it may be possible to force the model to distribute its uncertainty
    across different parts of a larger question.

    '
  background:
    description: 'The stability and pre-planned nature of text generated by RL-fine-tuned
      LLMs may limit their adaptability to new information. This contrasts with base
      LLMs, which are less controllable but more reactive. Exploring ways to leverage
      or mitigate this property could improve model performance in dynamic or uncertain
      contexts.

      '
